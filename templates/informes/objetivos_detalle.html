{% extends "base.html" %}
{% load widget_tweaks %}
{% load static %}

{% block title %}Objetivos Detalle{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'informes/objetivos_detalle/css/objetivos_detalle.css' %}">
<div class="container-fluid p-5 mt-2">
    <h4 class="mb-2 text-body">Detalle de Objetivos</h4>

    <div class="card mb-2">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>Filtros y Exportación</div>
            <div class="ms-auto">
                <button type="button" id="downloadPdfBtn" class="btn btn-danger btn-sm mr-2">
                    <i class="bi bi-file-earmark-pdf"></i> PDF
                </button>
                <button type="button" id="downloadCsvBtn" class="btn btn-success btn-sm me-2">
                    <i class="bi bi-file-earmark-arrow-down"></i> CSV
                </button>
            </div>
        </div>
        <div class="card-body pt-0 pb-2">
            <form id="filterForm" class="row g-3 align-items-center">
                
                <div class="col-md-1">
                    <label for="filterDni" class="form-label">Buscar DNI</label>
                    <input type="text" id="filterDni" class="form-control" placeholder="DNI Emp.">
                </div>

                <div class="col-md-2">
                    <label for="filterDepartamento" class="form-label">Departamento</label>
                    <select id="filterDepartamento" class="form-select">
                        <option value="">Todos</option>
                    </select>
                </div>
                
                <div class="col-md-2">
                    <label for="filterEstado" class="form-label">Estado</label>
                    <select id="filterEstado" class="form-select">
                        <option value="">Todos</option>
                        <option value="true">Completado</option>
                        <option value="false">Pendiente</option>
                    </select>
                </div>

                <div class="col-md-1">
                    <label for="filterRecurrencia" class="form-label">Recurrencia</label>
                    <select id="filterRecurrencia" class="form-select">
                        <option value="">Todos</option>
                        <option value="recurrente">Diario</option>
                        <option value="aislado">Único</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="filterFechaDesde" class="form-label">Fecha Desde</label>
                    <input type="date" id="filterFechaDesde" class="form-control">
                </div>

                <div class="col-md-2">
                    <label for="filterFechaHasta" class="form-label">Fecha Hasta</label>
                    <input type="date" id="filterFechaHasta" class="form-control">
                </div>

                <div class="col-md-2 d-flex align-items-end align-bottom-buttons pb-2">
                    <button type="button" id="clearFiltersBtn" class="btn btn-primary w-100 p-2" style="font-size: 0.85rem;">Limpiar Filtros</button>
                </div>

            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0 bg-body">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover table-sm mb-0" id="objectivesTable">
                    <thead class="text-center">
                        <tr class="text-body">
                            <th>Empleado</th>
                            <th>DNI</th>
                            <th>Objetivo</th>
                            <th>Tipo</th>
                            <th>Departamento</th>
                            <th>Fecha Fin</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody class="text-center" id="objectivesTableBody">
                        <tr><td colspan="7" class="text-center text-body">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-transparent mt-1">
                <nav>
                    <ul class="pagination justify-content-center mb-0" id="paginationControls"></ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'informes/objetivos_detalle/js/objetivos_detalle.js' %}"></script>
{% endblock %}
