<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido - Sistema RRHH</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff !important;
            box-sizing: border-box;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        .error-card {
            max-width: 480px;
            width: 90%;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .icon-container {
            display: inline-block;
            margin-bottom: 20px;
            width: 80px;
            height: 80px;
        }
        .icon-shield {
            width: 100%;
            height: 100%;
            fill: #0dcaf0;
            filter: drop-shadow(0 0 15px rgba(13, 202, 240, 0.5));
        }
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
            color: #ffffff;
        }
        .description {
            color: #cbd5e1;
            font-size: 0.92rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .alert-box {
            background-color: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
            border-radius: 8px;
            padding: 14px;
            color: #facc15;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .btn-reload {
            display: inline-block;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #0dcaf0;
            text-decoration: none;
            border: 2px solid #0dcaf0;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .btn-reload:hover {
            background-color: #0dcaf0;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.4);
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="icon-container" style="display: inline-block; margin-bottom: 25px; width: 90px; height: 90px;">
            <svg viewBox="0 0 100 100" xmlns="http://w3.org" style="width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(13, 202, 240, 0.6));">
                <path fill="#0dcaf0" d="M50,10 C68,14 82,18 88,24 C86,55 75,76 50,90 C25,76 14,55 12,24 C18,18 32,14 50,10 Z"/>                
                <path fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" d="M38,44 V34 A12,12 0 0,1 62,34 V44" />
                <rect x="32" y="44" width="36" height="26" rx="4" fill="#ffffff" />
                <circle cx="50" cy="54" r="3" fill="#0dcaf0" />
                <path fill="#0dcaf0" d="M48.5,54 L51.5,54 L52,63 L48,63 Z" />
            </svg>
        </div>



        
        <div class="title">Acceso Restringido</div>
        
        <div class="description">
            Se ha detectado una ráfaga inusual de peticiones consecutivas desde su dirección IP por medidas de seguridad informática del sistema de Recursos Humanos.
        </div>
        
        <div class="alert-box">
            ⚠️ Por razones de estabilidad del servidor, espere 1 minuto antes de refrescar o reintentar el ingreso.
        </div>

        <button onclick="window.location.reload();" class="btn-reload">
            Reintentar Conexión
        </button>
    </div>

</body>
</html>
